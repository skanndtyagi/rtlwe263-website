<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login | RTLWE263</title>
    <meta name="description" content="Login to the RTLWE263 admin dashboard." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container" style="padding: 4rem 0;">
      <section class="section" style="max-width: 520px; margin: 0 auto;">
        <h1>Admin login</h1>
        <p>Enter the admin password to access the dashboard. This page keeps the CMS separate from the public site.</p>
        <form id="admin-login-form" class="guestbook-form">
          <label>Password<input id="admin-password" type="password" required autocomplete="current-password" /></label>
          <button class="btn btn-primary" type="submit">Continue</button>
        </form>
        <div id="login-status" style="margin-top: 1.2rem; padding: .8rem; border-radius: 8px; font-size: 0.9rem; display: none;"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="admin-login.js"></script>
  </body>
</html>
